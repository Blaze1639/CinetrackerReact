name: CI/CD CineTracker

on:
  push:
    branches:
      - main
      - DEV

  pull_request:
    branches:
      - main
      - DEV

jobs:

  # =========================
  # LINTING & CODE QUALITY
  # =========================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances frontend
        working-directory: frontend
        run: npm install

      - name: Vérifier la syntaxe JavaScript/JSX
        working-directory: frontend
        run: npm run build
        continue-on-error: true

  # =========================
  # TESTS FRONTEND
  # =========================
  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests unitaires
        run: npm test -- --watchAll=false --coverage
        continue-on-error: true

      - name: Vérifier le build de production
        run: npm run build

  # =========================
  # VÉRIFICATION BACKEND
  # =========================
  backend-check:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_mysql, json

      - name: Vérifier la syntaxe PHP
        run: |
          find backend/api -name "*.php" -exec php -l {} \;

  # =========================
  # BUILD DOCKER
  # =========================
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-check]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          tags: cinetracker-frontend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          tags: cinetracker-backend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================
  # NOTIFICATION DE SUCCÈS
  # =========================
  notify-success:
    runs-on: ubuntu-latest
    needs: [lint, frontend-tests, backend-check, docker-build]
    if: success()

    steps:
      - name: Afficher le statut de succès
        run: |
          echo "✅ CI/CD Pipeline exécuté avec succès!"
          echo "- Linting: Réussi"
          echo "- Tests Frontend: Réussi"
          echo "- Vérification Backend: Réussie"
          echo "- Builds Docker: Réussis"

  # =========================
  # NOTIFICATION D'ERREUR
  # =========================
  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint, frontend-tests, backend-check, docker-build]
    if: failure()

    steps:
      - name: Afficher le statut d'erreur
        run: |
          echo "❌ Le pipeline CI/CD a rencontré des erreurs"
          echo "Vérifiez les logs pour plus de détails"
        shell: bash