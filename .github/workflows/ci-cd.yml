name: CI/CD CineTracker

on:
  push:
    branches:
      - main
      - DEV
  pull_request:
    branches:
      - main
      - DEV

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Vérifier la syntaxe JavaScript/JSX
        working-directory: frontend
        run: npm run build
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm test -- --watchAll=false --coverage
        continue-on-error: true

      - name: Vérifier le build de production
        run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_mysql, json

      - name: Vérifier la syntaxe PHP
        run: find backend/api -name "*.php" -exec php -l {} \;

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-check]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          tags: cinetracker-frontend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          tags: cinetracker-backend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-success:
    runs-on: ubuntu-latest
    needs: [lint, frontend-tests, backend-check, docker-build]
    if: success()
    steps:
      - run: |
          echo "✅ Pipeline exécuté avec succès!"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint, frontend-tests, backend-check, docker-build]
    if: failure()
    steps:
      - run: |
          echo "❌ Le pipeline a rencontré des erreurs"